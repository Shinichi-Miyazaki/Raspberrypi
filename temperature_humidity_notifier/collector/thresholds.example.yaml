# 温度変化率アラートの設定ファイル（雛形）
#
# 使い方: このファイルを NAS の config/thresholds.yaml にコピーして使う。
#   cp thresholds.example.yaml /mnt/sensor_data/config/thresholds.yaml
#
# アラートの仕組み:
#   温度の変化率 |ΔT/Δt|（°C/分）が 閾値 θ = μ + k・σ を超えるとSlackに通知される。
#   μ（平均）と σ（標準偏差）は、コレクターのdaily処理が過去30日のデータから
#   毎晩自動計算して書き込むため、手で編集するのは基本的に k だけでよい。
#
# k の調整方法（運用しながら）:
#   - 誤報が多い（何もないのにアラートが来る）→ k を大きくする（例: 3 → 4）
#   - 見逃しがある（異常だったのにアラートが来なかった）→ k を小さくする（例: 3 → 2.5）

# 全デバイス共通のデフォルト値
defaults:
  k: 3.0                   # 閾値係数（初期値3）
  alert_cooldown_hours: 6  # 同じデバイスの変化率アラートを再送しない時間
  baseline_days: 7         # 運用開始からこの日数はアラートを出さない（統計の助走期間）
  missing_data_hours: 2    # データがこの時間止まったら欠測アラート

# デバイスごとの個別設定。書いた項目だけが defaults を上書きする。
# mu / sigma / stats_updated / stats_samples はdaily処理が自動で書き込む（手動編集不要）
devices:
  "246":
    k: 3.0
  # "247":
  #   k: 2.5               # 例: このデバイスだけ敏感にしたい場合
