# 範囲逸脱アラートの設定ファイル（雛形）
#
# 使い方: このファイルを NAS の config/thresholds.yaml にコピーして使う。
#   cp thresholds.example.yaml /mnt/sensor_data/config/thresholds.yaml
#
# アラートの仕組み:
#   温度・湿度が「許容範囲」から外れた測定が2回連続したらSlackに通知される。
#   2連続を条件にすることで、単発のセンサーノイズや短時間のドア開閉では鳴らず、
#   インキュベータの開けっ放しのような継続的な逸脱だけを捉える。
#   許容範囲は運用者が部屋ごとに決める値なので、自分で記入・調整する。
#
# 許容範囲の書き方: [下限, 上限]
#   temp_range: [20, 28]  → 20°C未満 または 28°C超 が2連続でアラート
#   humid_range: [30, 70] → 30%未満 または 70%超 が2連続でアラート
#   設定しなかった項目（temp_range / humid_range）は判定されない（通知は出ない）。
#
# 範囲の調整方法（運用しながら）:
#   - 誤報が多い（開けっ放しでもないのに鳴る）→ 範囲を広げる（例: [20, 28] → [18, 30]）
#   - 見逃しがある（逸脱していたのに鳴らなかった）→ 範囲を狭める

# 全デバイス共通のデフォルト値
defaults:
  alert_cooldown_hours: 6   # 同じデバイス・同じ項目のアラートを再送しない時間
  missing_data_hours: 2     # データがこの時間止まったら欠測アラート
  # 全デバイス共通で範囲を効かせたい場合は、下の2行のコメントを外す
  # temp_range: [20, 28]    # 温度の許容範囲 [下限, 上限]（°C）
  # humid_range: [30, 70]   # 湿度の許容範囲 [下限, 上限]（%）

# デバイスごとの個別設定。書いた項目だけが defaults を上書きする。
devices:
  "246":
    temp_range: [20, 28]    # このデバイス（部屋）の温度許容範囲。実際の条件に合わせて調整する
    # humid_range: [40, 60] # 湿度も監視したい場合はコメントを外して範囲を書く
  # "247":
  #   temp_range: [18, 25]  # 例: この部屋だけ範囲を変えたい場合
